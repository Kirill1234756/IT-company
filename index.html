    <!-- Preconnect к внешним доменам для ускорения загрузки -->
    <link rel="preconnect" href="https://mc.yandex.ru">
    <link rel="dns-prefetch" href="https://mc.yandex.ru">
    <!-- Оптимизированная загрузка шрифтов для мобильных -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Критический шрифт: используем font-display: optional для предотвращения блокировки рендера -->
    <!-- Загружаем асинхронно после LCP для мобильных -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;600;700&display=optional&subset=cyrillic" rel="stylesheet" media="print" onload="this.media='all'">
    <!-- Некритичные шрифты — отложенная загрузка до после LCP -->
    <script>
      // Отложенная загрузка некритичных шрифтов на мобильных
      if (window.innerWidth < 768) {
        window.addEventListener('load', function() {
          setTimeout(function() {
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=IBM+Plex+Mono:wght@400;500&display=optional&subset=cyrillic';
            document.head.appendChild(link);
          }, 3000);
        });
      } else {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=IBM+Plex+Mono:wght@400;500&display=optional&subset=cyrillic';
        link.media = 'print';
        link.onload = function() { this.media = 'all'; };
        document.head.appendChild(link);
      }
    </script>
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;600;700&display=optional&subset=cyrillic" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=IBM+Plex+Mono:wght@400;500&display=optional&subset=cyrillic" rel="stylesheet">
    </noscript>
    <!-- Preload hero image удален - изображение загружается через компоненты -->

    <!-- Минимальный критический CSS только для первого экрана и LCP элемента -->
    <style>
      *{box-sizing:border-box}
      #app{min-height:100vh;background:#0f0f23;margin:0;padding:0}
      body{margin:0;padding:0;padding-top:64px;overflow-x:hidden;background:#0f0f23;color:white;font-size:16px;line-height:1.5}
      header{position:fixed;top:0.7rem;left:0;width:100%;height:48px;z-index:10;margin:0;padding:0}
      .main-section{min-height:100vh;display:flex;align-items:start;justify-content:center;background:#0f0f23;color:white;position:relative;width:100%;contain:layout style paint}
      .main-section h1{font-size:clamp(1.5rem,4vw,3rem);font-weight:700;line-height:1.2;margin:0;color:#FF8863;font-family:'IBM Plex Sans Condensed','Arial Narrow',Arial,sans-serif;max-width:1200px;width:100%;opacity:1!important;visibility:visible!important;min-height:2.4em}
      .stack-section{min-height:100vh;width:100%;box-sizing:border-box;contain:layout style paint;flex:none;overflow:hidden;position:relative}
      #stack{position:relative;width:100%;height:100vh;display:flex;flex-flow:column nowrap;overflow-x:hidden;overflow-y:auto;background-color:transparent}
    </style>
  
    <title>Kodify</title>
  </head>
  <body>
    <div id="app">
      <!-- App content is rendered by Vue -->
    </div>
    <!-- Runtime API base override for production hosting without .env injection -->
    <!-- 
      Для продакшена можно задать API URL здесь вместо .env файла:
      window.API_BASE = 'https://api.kodifyweb.ru/api'
      
      Или используйте переменную окружения VITE_API_URL в .env файле (рекомендуется)
    -->
    <script>
      // Ensure API_BASE is always a string, never a function
      if (typeof window.API_BASE !== 'string') {
        // Продакшен: используем api.kodifyweb.ru
        window.API_BASE = 'https://api.kodifyweb.ru/api'
      }
      // Double check - if it's somehow a function, override it
      if (typeof window.API_BASE === 'function') {
        console.warn('API_BASE was a function, fixing it to be a string')
        // Продакшен: используем api.kodifyweb.ru
        window.API_BASE = 'https://api.kodifyweb.ru/api'
      }
    </script>
    <script type="module" defer src="/src/main.ts"></script>
    
    <!-- Yandex.Metrika noscript fallback -->
    <noscript>
      <div>
        <img src="https://mc.yandex.ru/watch/106861768" style="position:absolute; left:-9999px;" alt="" />
      </div>
    </noscript>
  </body>
