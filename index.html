<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/webp" href="/logo3.webp">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/logo3.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kodify — продажа сайтов и цифровых решений для развития бизнеса. Разработка корпоративных сайтов, интернет-магазинов, лендингов. Продвижение и поддержка. Портфолио и экспертный блог.">
    <meta name="yandex-verification" content="" />
    <meta name="google-site-verification" content="HB8_ge4y42V45ASCsEusJyNFDCtD0_8M5104x6jKuno" />
    <meta property="og:title" content="Kodify - Продажа сайтов и цифровых решений" />
    <meta property="og:description" content="Kodify — продажа сайтов и цифровых решений для развития бизнеса. Разработка корпоративных сайтов, интернет-магазинов, лендингов. Продвижение и поддержка." />
    <meta property="og:image" content="https://kodifyweb.ru/og-image.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kodifyweb.ru/" />
    <link rel="canonical" href="https://kodifyweb.ru/" />
    <!-- Preconnect к внешним доменам для ускорения загрузки -->
    <link rel="preconnect" href="https://mc.yandex.ru">
    <link rel="dns-prefetch" href="https://mc.yandex.ru">
    <!-- LCP: ранний preload героя только на главной (woff2 — через бандл из fonts.css) -->
    <script>
      (function () {
        var p = location.pathname
        if (p === '/' || p === '/home') {
          var l = document.createElement('link')
          l.rel = 'preload'
          l.as = 'image'
          l.href = '/img/hero/office.png'
          l.setAttribute('fetchpriority', 'high')
          document.head.appendChild(l)
        }
      })()
    </script>

    <!-- Минимальный критический CSS только для первого экрана и LCP элемента -->
    <style>
      *{box-sizing:border-box}
      html{margin:0;padding:0}
      /* Совпадает с Tailwind @theme / style.css — иначе видна полоска другого оттенка под фикс. шапкой */
      #app{min-height:100vh;background:#03122F;margin:0;padding:0}
      body{margin:0;padding:0;padding-top:56px;overflow-x:hidden;background:#03122F;color:white;font-size:16px;line-height:1.5}
      /* Совпадает с App.vue: шапка прижата к верху viewport без щели */
      header{position:fixed;top:0;left:0;width:100%;z-index:10;margin:0;padding:0}
      .main-section{min-height:100vh;display:flex;align-items:start;justify-content:center;background:#03122F;color:white;position:relative;width:100%;contain:layout style paint}
      .main-section h1{font-size:clamp(1.5rem,4vw,3rem);font-weight:700;line-height:1.2;margin:0;color:#FF8863;font-family:'IBM Plex Sans Condensed','Arial Narrow',Arial,sans-serif;max-width:1200px;width:100%;opacity:1!important;visibility:visible!important;min-height:2.4em}
      .stack-section{min-height:100vh;width:100%;box-sizing:border-box;contain:layout style paint;flex:none;overflow:hidden;position:relative}
      #stack{position:relative;width:100%;height:100vh;display:flex;flex-flow:column nowrap;overflow-x:hidden;overflow-y:auto;background-color:transparent}
    </style>
  
    <title>Kodify</title>
  </head>
  <body>
    <div id="app">
      <!-- App content is rendered by Vue -->
    </div>
    <!-- Runtime API base override for production hosting without .env injection -->
    <!-- 
      Для продакшена можно задать API URL здесь вместо .env файла:
      window.API_BASE = 'https://api.kodifyweb.ru/api'
      
      Или используйте переменную окружения VITE_API_URL в .env файле (рекомендуется)
    -->
    <script>
      // Ensure API_BASE is always a string, never a function
      if (typeof window.API_BASE !== 'string') {
        // Продакшен: используем api.kodifyweb.ru
        window.API_BASE = 'https://api.kodifyweb.ru/api'
      }
      // Double check - if it's somehow a function, override it
      if (typeof window.API_BASE === 'function') {
        console.warn('API_BASE was a function, fixing it to be a string')
        // Продакшен: используем api.kodifyweb.ru
        window.API_BASE = 'https://api.kodifyweb.ru/api'
      }
    </script>
    <script type="module" defer src="/src/main.ts"></script>
    
    <!-- Yandex.Metrika noscript fallback -->
    <noscript>
      <div>
        <img src="https://mc.yandex.ru/watch/106861768" style="position:absolute; left:-9999px;" alt="" />
      </div>
    </noscript>
  </body>
</html>
